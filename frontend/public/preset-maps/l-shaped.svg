<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>L-Shaped Hall — generic floor plan</title>
  <rect width="800" height="500" fill="#f4f4f5" />
  <polygon
    points="40,40 480,40 480,280 760,280 760,460 40,460"
    fill="#ffffff" stroke="#003764" stroke-width="4" stroke-linejoin="round"
  />
  <g stroke="#d0cfcd" stroke-width="1">
    <line x1="180" y1="40" x2="180" y2="460" />
    <line x1="320" y1="40" x2="320" y2="460" />
    <line x1="600" y1="280" x2="600" y2="460" />
  </g>
  <text x="240" y="255" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#a7a8a9" font-weight="600">MAIN HALL</text>
  <text x="670" y="375" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#a7a8a9" font-weight="600">WING</text>
  <rect x="330" y="440" width="140" height="20" fill="#005cb9" />
  <text x="400" y="454" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff" font-weight="600">ENTRANCE</text>
</svg>
