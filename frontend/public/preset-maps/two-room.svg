<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Two Connected Rooms — generic floor plan</title>
  <rect width="800" height="500" fill="#f4f4f5" />

  <rect x="40" y="40" width="320" height="420" fill="#ffffff" stroke="#003764" stroke-width="4" />
  <rect x="440" y="40" width="320" height="420" fill="#ffffff" stroke="#003764" stroke-width="4" />

  <rect x="360" y="220" width="80" height="60" fill="#ffffff" stroke="#003764" stroke-width="4" />
  <text x="400" y="255" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a7a8a9" font-weight="600">DOOR</text>

  <g stroke="#d0cfcd" stroke-width="1">
    <line x1="120" y1="40" x2="120" y2="460" />
    <line x1="280" y1="40" x2="280" y2="460" />
    <line x1="520" y1="40" x2="520" y2="460" />
    <line x1="680" y1="40" x2="680" y2="460" />
  </g>

  <text x="200" y="150" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#a7a8a9" font-weight="600">ROOM A</text>
  <text x="600" y="150" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#a7a8a9" font-weight="600">ROOM B</text>

  <rect x="130" y="440" width="140" height="20" fill="#005cb9" />
  <text x="200" y="454" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff" font-weight="600">ENTRANCE</text>
</svg>
