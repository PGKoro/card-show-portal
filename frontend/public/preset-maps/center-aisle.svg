<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Hall with Center Aisle — generic floor plan</title>
  <rect width="800" height="500" fill="#f4f4f5" />
  <rect x="40" y="40" width="720" height="420" fill="#ffffff" stroke="#003764" stroke-width="4" />

  <rect x="360" y="40" width="80" height="420" fill="#eef4fb" />
  <line x1="360" y1="40" x2="360" y2="460" stroke="#005cb9" stroke-width="2" stroke-dasharray="6 6" />
  <line x1="440" y1="40" x2="440" y2="460" stroke="#005cb9" stroke-width="2" stroke-dasharray="6 6" />
  <text x="400" y="255" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#005cb9" font-weight="600" transform="rotate(90 400 255)">AISLE</text>

  <g stroke="#d0cfcd" stroke-width="1">
    <line x1="120" y1="40" x2="120" y2="460" />
    <line x1="240" y1="40" x2="240" y2="460" />
    <line x1="560" y1="40" x2="560" y2="460" />
    <line x1="680" y1="40" x2="680" y2="460" />
  </g>

  <text x="200" y="255" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#a7a8a9" font-weight="600">VENDOR ROW</text>
  <text x="600" y="255" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#a7a8a9" font-weight="600">VENDOR ROW</text>

  <rect x="330" y="440" width="140" height="20" fill="#005cb9" />
  <text x="400" y="454" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff" font-weight="600">ENTRANCE</text>
</svg>
